# Bark Technologies — Infrastructure
# Run: docker compose up -d

services:

  mongodb:
    image: mongo:7
    container_name: bark-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7
    container_name: bark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bark-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/BarkTech
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: bark-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/BarkTech
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bark-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - agent

volumes:
  mongodata:
  redisdata:
